name: build-and-push

# Builds the FloorSet local-test image in two variants and pushes both to GHCR:
#   ghcr.io/<owner>/cadcontest26c_docker:cpu      (also tagged :latest)
#   ghcr.io/<owner>/cadcontest26c_docker:gpu      (CUDA wheels, run with --gpus all)
on:
  push:
    branches:
      - main
      - claude/practical-brown-pe6rkf
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'op_wrapper.py'
      - 'scripts/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:
    inputs:
      floorset_ref:
        description: 'IntelLabs/FloorSet git ref to build against'
        required: false
        default: 'main'
      bake_dataset:
        description: 'Pre-bake the validation dataset into the image (1/0)'
        required: false
        default: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            torch_index: https://download.pytorch.org/whl/cpu
            is_default: true
          - variant: gpu
            torch_index: https://download.pytorch.org/whl/cu124
            is_default: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/lib/node_modules || true
          docker image prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Global suffix tags the auto branch/sha refs as e.g. "<branch>-cpu".
          flavor: |
            latest=false
            suffix=-${{ matrix.variant }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=${{ matrix.variant }},suffix=
            type=raw,value=latest,suffix=,enable=${{ matrix.is_default && (github.ref_name == 'claude/practical-brown-pe6rkf' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TORCH_INDEX_URL=${{ matrix.torch_index }}
            FLOORSET_REF=${{ github.event.inputs.floorset_ref || 'main' }}
            BAKE_DATASET=${{ github.event.inputs.bake_dataset || '1' }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          provenance: false

      - name: Summary
        run: |
          echo "### Pushed image tags (${{ matrix.variant }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
